<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Experiencias de Marca 2.0</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 50px; }
        img { max-width: 200px; }
        input { display: block; margin: 10px auto; padding: 8px; width: 80%; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <img src="LOGO EXPERIENCIAS DE MARCA 2.0.pdf.png" alt="Logo Experiencias de Marca">
        
        <h1>Registro de Experiencia</h1>
        <form id="miFormulario">
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="email" name="correo" placeholder="Correo" required>
            <button type="submit">Enviar a Sheets</button>
        </form>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzSXnx4KBxieVyyuNZnvRqYfkxzCYTCuI7XSLnlLL2gvqX5fs3dUEWtf10_1Wv898v1/exec';
        const form = document.getElementById('miFormulario');

        form.addEventListener('submit', e => {
            e.preventDefault();
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => alert('¡Datos enviados con éxito!'))
                .catch(error => console.error('Error!', error.message));
        });
    </script>
</body>
</html>
