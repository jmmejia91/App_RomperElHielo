<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiencias de Marca 2.0</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        img { max-width: 180px; margin-bottom: 20px; }
        h2 { color: #333; margin-bottom: 20px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; color: #666; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 15px; background: #000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        button:disabled { background: #666; }
    </style>
</head>
<body>

<div class="container">
    <img src="LOGO%20EXPERIENCIAS%20DE%20MARCA%202.0.pdf.png" alt="Logo">
    <h2>Registro de Ganador</h2>
    
    <form id="registroForm">
        <div class="form-group">
            <label>Nombre del Ganador</label>
            <input type="text" name="nombre" required>
        </div>
        <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" name="telefono" required>
        </div>
        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" name="correo" required>
        </div>
        <div class="form-group">
            <label>Premio Ganado</label>
            <select name="premio" required>
                <option value="" disabled selected>Selecciona el premio</option>
                <option value="25% de descuento en tu proximo pedido">25% de descuento en tu proximo pedido</option>
                <option value="1 botella gratis de entrega inmediata">1 botella gratis de entrega inmediata</option>
                <option value="6 meses de cerveza gratis">6 meses de cerveza gratis</option>
            </select>
        </div>
        <button type="submit" id="btnEnviar">Registrar Ganador</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzSXnx4KBxieVyyuNZnvRqYfkxzCYTCuI7XSLnlLL2gvqX5fs3dUEWtf10_1Wv898v1/exec';
    const form = document.getElementById('registroForm');
    const btn = document.getElementById('btnEnviar');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'ENVIANDO...';

        // Usamos URLSearchParams para que el Apps Script reciba los datos correctamente
        const formData = new FormData(form);
        const params = new URLSearchParams();
        for (const pair of formData) {
            params.append(pair[0], pair[1]);
        }

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', // Esto evita errores de seguridad de Chrome/Safari
            body: params 
        })
        .then(() => {
            alert('¡Registro guardado con éxito!');
            form.reset();
            btn.disabled = false;
            btn.innerText = 'REGISTRAR GANADOR';
        })
        .catch(error => {
            console.error('Error!', error.message);
            alert('Error al enviar. Verifica tu conexión.');
            btn.disabled = false;
            btn.innerText = 'REGISTRAR GANADOR';
        });
    });
</script>

</body>
</html>
